<div *ngIf="cart.length > 0" class="cart-summary">
  🛒 <strong>{{cart.length}} pizza(s) no carrinho</strong>
</div>

<div class="pizza-grid">
  <div class="pizza-card" *ngFor="let pizza of pizzas; trackBy: trackByName">
    <img [src]="pizza.image" alt="{{pizza.name}}" loading="lazy">
    <h3>{{pizza.name}}</h3>
    <p>R$ {{pizza.price | number: '1.2-2'}}</p>
    <button (click)="addToCart(pizza)" [disabled]="isInCart(pizza)">
      {{ isInCart(pizza) ? '✓ Adicionada' : '🛒 Adicionar' }}
    </button>
  </div>
</div>

<div class="button-container">
  <button (click)="finalizeOrder()" [disabled]="cart.length === 0">
    {{ cart.length === 0 ? 'Selecione suas pizzas primeiro' : '✓ Finalizar Pedido (' + cart.length + ')' }}
  </button>
</div>
