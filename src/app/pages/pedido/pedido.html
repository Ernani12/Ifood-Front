<h2>Resumo do Pedido</h2>

<div *ngIf="loading">Carregando carrinho...</div>

<div *ngIf="!loading && cart.length > 0; else vazio">
  <div *ngFor="let pizza of cart; trackBy: trackByName">
    {{ pizza.name }} - R$ {{ pizza.price }} x {{ pizza.quantity }}
  </div>
  <p><strong>Total: R$ {{ total }}</strong></p>
  <button (click)="enviarPedido()">Enviar Pedido</button>
</div>

<ng-template #vazio>
  <p>Seu carrinho está vazio...</p>
</ng-template>

<!-- Mensagem de feedback -->
<div *ngIf="message" [ngClass]="messageType">{{ message }}</div>
